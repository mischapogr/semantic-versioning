# CI workflow.
#
#   * build         - compiles + tests on every push and pull request.
#   * docker-pr     - on pull requests, builds and pushes a *test* image to the
#                     private registry, tagged with the next semantic version
#                     (computed via a semantic-release dry-run) plus a PR tag.
#   * docker-release- on a published Release (created by the Semantic Versioning
#                     workflow), builds and pushes the image tagged with the
#                     release version and :latest.
#
# Required repository secrets:
#   REGISTRY           e.g. registry.example.com  (private Docker registry host)
#   REGISTRY_USERNAME  registry login user
#   REGISTRY_PASSWORD  registry login password / token
#   IMAGE_NAME         (optional) image path; defaults to <owner>/<repo>
name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
    branches: [main, master]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace

  docker-pr:
    name: Build & push PR test image
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for version analysis)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install release tooling
        run: npm ci

      - name: Compute next version (semantic-release dry-run)
        id: semver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT=$(npx semantic-release --dry-run 2>&1 || true)
          echo "$OUT"
          NEXT=$(printf '%s\n' "$OUT" \
            | grep -oiE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Resolve version and image
        id: meta
        run: |
          NEXT="${{ steps.semver.outputs.version }}"
          if [ -z "$NEXT" ]; then
            LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.0)
            NEXT="${LAST#v}"
          fi
          SHA=$(git rev-parse --short HEAD)
          VERSION="${NEXT}-pr.${{ github.event.pull_request.number }}.${SHA}"
          IMAGE=$(printf '%s/%s' "${{ secrets.REGISTRY }}" "${IMAGE_NAME:-${{ github.repository }}}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR image ${IMAGE}:${VERSION}"
        env:
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push PR test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:pr-${{ github.event.pull_request.number }}

  docker-release:
    name: Build & push release image
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version and image
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          IMAGE=$(printf '%s/%s' "${{ secrets.REGISTRY }}" "${IMAGE_NAME:-${{ github.repository }}}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved release image ${IMAGE}:${VERSION}"
        env:
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
